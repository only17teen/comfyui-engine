groups:
  - name: comfyui-engine-alerts
    interval: 30s
    rules:
      - alert: ComfyUIHighErrorRate
        expr: rate(comfyui_engine_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High error rate on {{ $labels.instance }}"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"
          runbook_url: "https://wiki.internal/runbooks/comfyui-high-error-rate"
          dashboard_url: "https://grafana.internal/d/comfyui-engine"

      - alert: ComfyUIHighLatency
        expr: comfyui_engine_latency_p95 > 60
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High latency on {{ $labels.instance }}"
          description: "P95 latency is {{ $value }}s over the last 5 minutes"
          runbook_url: "https://wiki.internal/runbooks/comfyui-high-latency"

      - alert: ComfyUIExtremeLatency
        expr: comfyui_engine_latency_p99 > 120
        for: 2m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Extreme latency on {{ $labels.instance }}"
          description: "P99 latency is {{ $value }}s - immediate attention required"
          runbook_url: "https://wiki.internal/runbooks/comfyui-extreme-latency"

      - alert: ComfyUIGPUOutOfMemory
        expr: comfyui_engine_gpu_memory_usage > 0.95
        for: 1m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "GPU out of memory on {{ $labels.instance }}"
          description: "GPU memory usage is {{ $value | humanizePercentage }}"
          runbook_url: "https://wiki.internal/runbooks/comfyui-gpu-oom"

      - alert: ComfyUIGPUHighTemperature
        expr: comfyui_engine_gpu_temperature > 85
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "GPU high temperature on {{ $labels.instance }}"
          description: "GPU temperature is {{ $value }}°C"
          runbook_url: "https://wiki.internal/runbooks/comfyui-gpu-temperature"

      - alert: ComfyUIQueueBacklog
        expr: comfyui_engine_queue_depth > 100
        for: 10m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Queue backlog on {{ $labels.instance }}"
          description: "Queue depth is {{ $value }} items"
          runbook_url: "https://wiki.internal/runbooks/comfyui-queue-backlog"

      - alert: ComfyUIQueueCritical
        expr: comfyui_engine_queue_depth > 500
        for: 5m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Critical queue backlog on {{ $labels.instance }}"
          description: "Queue depth is {{ $value }} items - scaling required"
          runbook_url: "https://wiki.internal/runbooks/comfyui-queue-critical"

      - alert: ComfyUIHighCPUUsage
        expr: rate(comfyui_engine_cpu_usage_seconds_total[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanizePercentage }}"

      - alert: ComfyUIHighMemoryUsage
        expr: comfyui_engine_memory_usage_bytes / comfyui_engine_memory_limit_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      - alert: ComfyUIPodRestartLoop
        expr: rate(kube_pod_container_status_restarts_total{pod=~"comfyui-engine.*"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Pod restart loop detected"
          description: "Pod {{ $labels.pod }} is restarting frequently"

      - alert: ComfyUIPodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{pod=~"comfyui-engine.*"}[15m]) > 3
        for: 2m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Pod crash looping"
          description: "Pod {{ $labels.pod }} is crash looping"
          runbook_url: "https://wiki.internal/runbooks/comfyui-crash-loop"

      - alert: ComfyUIDown
        expr: up{job="comfyui-engine"} == 0
        for: 1m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "ComfyUI Engine instance down"
          description: "Instance {{ $labels.instance }} is down"
          runbook_url: "https://wiki.internal/runbooks/comfyui-down"

      - alert: ComfyUISSLCertificateExpiring
        expr: (ssl_certificate_expiry_seconds - time()) / 86400 < 7
        for: 1h
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "SSL certificate expiring soon"
          description: "Certificate expires in {{ $value | humanizeDuration }}"

      - alert: ComfyUIRateLimitHit
        expr: rate(comfyui_engine_rate_limit_hits_total[5m]) > 0
        for: 5m
        labels:
          severity: info
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Rate limit being hit"
          description: "Rate limit hits: {{ $value }}/s"

      - alert: ComfyUIWebsocketConnectionsHigh
        expr: comfyui_engine_websocket_connections > 1000
        for: 10m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High websocket connections"
          description: "{{ $value }} active websocket connections"

      - alert: ComfyUIModelLoadFailures
        expr: rate(comfyui_engine_model_load_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Model load failures detected"
          description: "Model load failures: {{ $value }}/s"

      - alert: ComfyUIInferenceTimeout
        expr: rate(comfyui_engine_inference_timeouts_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Inference timeouts detected"
          description: "Inference timeouts: {{ $value }}/s"

      - alert: ComfyUIFailoverTriggered
        expr: comfyui_engine_failover_active == 1
        for: 1m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Failover triggered"
          description: "Failover is active for {{ $labels.region }}"
          runbook_url: "https://wiki.internal/runbooks/comfyui-failover"

      - alert: ComfyUIMultiRegionLatency
        expr: comfyui_engine_cross_region_latency_p95 > 200
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High cross-region latency"
          description: "Cross-region latency P95: {{ $value }}ms"

      - alert: ComfyUICacheHitRateLow
        expr: comfyui_engine_cache_hit_rate < 0.5
        for: 15m
        labels:
          severity: info
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }}"

      - alert: ComfyUIBanditExplorationHigh
        expr: comfyui_engine_bandit_exploration_rate > 0.3
        for: 30m
        labels:
          severity: info
          service: comfyui-engine
          team: ml
        annotations:
          summary: "High bandit exploration rate"
          description: "Exploration rate is {{ $value | humanizePercentage }}"

      - alert: ComfyUIPrecognitionAccuracyLow
        expr: comfyui_engine_precognition_accuracy < 0.7
        for: 30m
        labels:
          severity: warning
          service: comfyui-engine
          team: ml
        annotations:
          summary: "Low precognition accuracy"
          description: "Precognition accuracy is {{ $value | humanizePercentage }}"

      - alert: ComfyUICostSpike
        expr: rate(comfyui_engine_cost_usd[1h]) > 100
        for: 1h
        labels:
          severity: warning
          service: comfyui-engine
          team: finance
        annotations:
          summary: "Cost spike detected"
          description: "Hourly cost is ${{ $value }}"

      - alert: ComfyUIDiskSpaceLow
        expr: comfyui_engine_disk_usage_bytes / comfyui_engine_disk_total_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Low disk space"
          description: "Disk usage is {{ $value | humanizePercentage }}"

      - alert: ComfyUIDiskSpaceCritical
        expr: comfyui_engine_disk_usage_bytes / comfyui_engine_disk_total_bytes > 0.95
        for: 2m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Critical disk space"
          description: "Disk usage is {{ $value | humanizePercentage }} - immediate action required"

      - alert: ComfyUIRequestRateSpike
        expr: rate(comfyui_engine_requests_total[5m]) > 1000
        for: 5m
        labels:
          severity: info
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Request rate spike"
          description: "Request rate: {{ $value }}/s"

      - alert: ComfyUIActiveSessionsHigh
        expr: comfyui_engine_active_sessions > 5000
        for: 10m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High active sessions"
          description: "{{ $value }} active sessions"

      - alert: ComfyUIWorkerPoolExhausted
        expr: comfyui_engine_available_workers == 0
        for: 2m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Worker pool exhausted"
          description: "No available workers in the pool"
          runbook_url: "https://wiki.internal/runbooks/comfyui-worker-pool"

      - alert: ComfyUIGPUUtilizationLow
        expr: comfyui_engine_gpu_utilization < 0.1
        for: 30m
        labels:
          severity: info
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Low GPU utilization"
          description: "GPU utilization is {{ $value | humanizePercentage }} - consider scaling down"

      - alert: ComfyUIGPUUtilizationHigh
        expr: comfyui_engine_gpu_utilization > 0.95
        for: 10m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High GPU utilization"
          description: "GPU utilization is {{ $value | humanizePercentage }}"

      - alert: ComfyUINetworkErrors
        expr: rate(comfyui_engine_network_errors_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Network errors detected"
          description: "Network errors: {{ $value }}/s"

      - alert: ComfyUIDatabaseConnectionFailures
        expr: rate(comfyui_engine_db_connection_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Database connection failures"
          description: "DB connection failures: {{ $value }}/s"

      - alert: ComfyUIRedisConnectionFailures
        expr: rate(comfyui_engine_redis_connection_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Redis connection failures"
          description: "Redis connection failures: {{ $value }}/s"

      - alert: ComfyUIVersionMismatch
        expr: comfyui_engine_version_mismatch == 1
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Version mismatch detected"
          description: "Running version does not match expected version"

      - alert: ComfyUISecurityEvent
        expr: rate(comfyui_engine_security_events_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          service: comfyui-engine
          team: security
        annotations:
          summary: "Security event detected"
          description: "Security events: {{ $value }}/s"
          runbook_url: "https://wiki.internal/runbooks/comfyui-security"

      - alert: ComfyUIRPSQuotaExceeded
        expr: comfyui_engine_rps_quota_exceeded == 1
        for: 1m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "RPS quota exceeded"
          description: "Requests per second quota has been exceeded"

      - alert: ComfyUIGeneticOptimizerStuck
        expr: comfyui_engine_genetic_optimizer_generations_without_improvement > 50
        for: 30m
        labels:
          severity: info
          service: comfyui-engine
          team: ml
        annotations:
          summary: "Genetic optimizer stuck"
          description: "No improvement for {{ $value }} generations"

      - alert: ComfyUIFunctionCallErrors
        expr: rate(comfyui_engine_function_call_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Function call errors"
          description: "Function call errors: {{ $value }}/s"

      - alert: ComfyUIABTestSignificant
        expr: comfyui_engine_ab_test_significant == 1
        for: 1m
        labels:
          severity: info
          service: comfyui-engine
          team: ml
        annotations:
          summary: "A/B test reached significance"
          description: "A/B test {{ $labels.test_name }} has reached statistical significance"

      - alert: ComfyUIMemoryLeakDetected
        expr: rate(comfyui_engine_memory_usage_bytes[1h]) > 0
        for: 2h
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Possible memory leak"
          description: "Memory usage has been growing for 2 hours"

      - alert: ComfyUIGoroutineLeak
        expr: comfyui_engine_goroutines > 10000
        for: 15m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High goroutine count"
          description: "{{ $value }} goroutines - possible leak"

      - alert: ComfyUIGCOverheadHigh
        expr: rate(comfyui_engine_gc_pause_duration_seconds[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High GC overhead"
          description: "GC is consuming significant time"

      - alert: ComfyUIFunctionTimeout
        expr: rate(comfyui_engine_function_timeout_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Function timeouts"
          description: "Function timeouts: {{ $value }}/s"

      - alert: ComfyUIImageGenerationFailures
        expr: rate(comfyui_engine_image_generation_failures_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Image generation failures"
          description: "Image generation failures: {{ $value }}/s"
          runbook_url: "https://wiki.internal/runbooks/comfyui-generation-failures"

      - alert: ComfyUIWorkflowValidationFailures
        expr: rate(comfyui_engine_workflow_validation_failures_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Workflow validation failures"
          description: "Workflow validation failures: {{ $value }}/s"

      - alert: ComfyUICheckpointFailures
        expr: rate(comfyui_engine_checkpoint_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Checkpoint failures"
          description: "Checkpoint failures: {{ $value }}/s"

      - alert: ComfyUISessionExpirationHigh
        expr: rate(comfyui_engine_session_expirations_total[5m]) > 100
        for: 10m
        labels:
          severity: info
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High session expiration rate"
          description: "Session expirations: {{ $value }}/s"

      - alert: ComfyUIAuthFailures
        expr: rate(comfyui_engine_auth_failures_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: security
        annotations:
          summary: "Authentication failures"
          description: "Auth failures: {{ $value }}/s"

      - alert: ComfyUIJWTValidationFailures
        expr: rate(comfyui_engine_jwt_validation_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
          service: comfyui-engine
          team: security
        annotations:
          summary: "JWT validation failures"
          description: "JWT validation failures: {{ $value }}/s"

      - alert: ComfyUIWebSocketErrors
        expr: rate(comfyui_engine_websocket_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "WebSocket errors"
          description: "WebSocket errors: {{ $value }}/s"

      - alert: ComfyUIStreamingErrors
        expr: rate(comfyui_engine_streaming_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Streaming errors"
          description: "Streaming errors: {{ $value }}/s"

      - alert: ComfyUINodeDiscoveryFailures
        expr: rate(comfyui_engine_node_discovery_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Node discovery failures"
          description: "Node discovery failures: {{ $value }}/s"

      - alert: ComfyUIClusterSyncFailures
        expr: rate(comfyui_engine_cluster_sync_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Cluster sync failures"
          description: "Cluster sync failures: {{ $value }}/s"

      - alert: ComfyUIGitSyncFailures
        expr: rate(comfyui_engine_git_sync_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Git sync failures"
          description: "Git sync failures: {{ $value }}/s"

      - alert: ComfyUIPluginLoadFailures
        expr: rate(comfyui_engine_plugin_load_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Plugin load failures"
          description: "Plugin load failures: {{ $value }}/s"

      - alert: ComfyUIOutputProcessingFailures
        expr: rate(comfyui_engine_output_processing_failures_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Output processing failures"
          description: "Output processing failures: {{ $value }}/s"

      - alert: ComfyUIPromptProcessingFailures
        expr: rate(comfyui_engine_prompt_processing_failures_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Prompt processing failures"
          description: "Prompt processing failures: {{ $value }}/s"

      - alert: ComfyUIModelCacheEvictions
        expr: rate(comfyui_engine_model_cache_evictions_total[5m]) > 100
        for: 10m
        labels:
          severity: info
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High model cache evictions"
          description: "Model cache evictions: {{ $value }}/s"

      - alert: ComfyUIModelCacheHitRateLow
        expr: comfyui_engine_model_cache_hit_rate < 0.3
        for: 15m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Low model cache hit rate"
          description: "Model cache hit rate is {{ $value | humanizePercentage }}"

      - alert: ComfyUIRedisCacheEvictions
        expr: rate(comfyui_engine_redis_cache_evictions_total[5m]) > 1000
        for: 10m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High Redis cache evictions"
          description: "Redis cache evictions: {{ $value }}/s"

      - alert: ComfyUIRequestSizeHigh
        expr: comfyui_engine_request_size_bytes > 10485760
        for: 5m
        labels:
          severity: info
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Large request size"
          description: "Request size: {{ $value | humanize1024 }}B"

      - alert: ComfyUIResponseSizeHigh
        expr: comfyui_engine_response_size_bytes > 104857600
        for: 5m
        labels:
          severity: info
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Large response size"
          description: "Response size: {{ $value | humanize1024 }}B"

      - alert: ComfyUIRequestDurationBimodal
        expr: stddev_over_time(comfyui_engine_request_duration_seconds[10m]) > 10
        for: 10m
        labels:
          severity: info
          service: comfyui-engine
          team: platform
        annotations:
          summary: "Bimodal request duration"
          description: "Request duration shows bimodal distribution"

      - alert: ComfyUIGPUKernelErrors
        expr: rate(comfyui_engine_gpu_kernel_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "GPU kernel errors"
          description: "GPU kernel errors: {{ $value }}/s"
          runbook_url: "https://wiki.internal/runbooks/comfyui-gpu-kernel"

      - alert: ComfyUIGPUMemoryErrors
        expr: rate(comfyui_engine_gpu_memory_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          service: comfyui-engine
          team: platform
        annotations:
          summary: "GPU memory errors"
          description: "GPU memory errors: {{ $value }}/s"

      - alert: ComfyUIGPUECCError
        expr: rate(comfyui_engine_gpu_ecc_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "GPU ECC errors"
          description: "GPU ECC errors: {{ $value }}/s"

      - alert: ComfyUIGPUPowerLimit
        expr: comfyui_engine_gpu_power_limit_active == 1
        for: 10m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "GPU power limit active"
          description: "GPU is operating at power limit"

      - alert: ComfyUIGPUPCIeErrors
        expr: rate(comfyui_engine_gpu_pcie_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "GPU PCIe errors"
          description: "GPU PCIe errors: {{ $value }}/s"

      - alert: ComfyUIGPUNvlinkErrors
        expr: rate(comfyui_engine_gpu_nvlink_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "GPU NVLink errors"
          description: "GPU NVLink errors: {{ $value }}/s"

      - alert: ComfyUIGPUDriverVersionMismatch
        expr: comfyui_engine_gpu_driver_version_mismatch == 1
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "GPU driver version mismatch"
          description: "GPU driver version does not match expected"

      - alert: ComfyUIGPUFabricManagerErrors
        expr: rate(comfyui_engine_gpu_fabric_manager_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "GPU fabric manager errors"
          description: "GPU fabric manager errors: {{ $value }}/s"

      - alert: ComfyUIInferenceQueueWaitTimeHigh
        expr: comfyui_engine_inference_queue_wait_time > 30
        for: 10m
        labels:
          severity: warning
          service: comfyui-engine
          team: platform
        annotations:
          summary: "High inference queue wait time"
          description: "Queue wait time: {{ $value }}s"

      - alert: ComfyUIInferenceProcessingTimeHigh
        expr: comfyui_engine_inference_processing_time > 60
        for: 10m
        labels:
