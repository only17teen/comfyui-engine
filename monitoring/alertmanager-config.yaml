global:
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@comfyui-engine.io'
  smtp_auth_username: 'alerts@comfyui-engine.io'
  smtp_auth_password: '${SMTP_PASSWORD}'
  slack_api_url: '${SLACK_WEBHOOK_URL}'
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
  resolve_timeout: 5m

templates:
- '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
  - match:
      severity: critical
    receiver: 'pagerduty-critical'
    continue: true
  - match:
      severity: warning
    receiver: 'slack-warnings'
    continue: true
  - match:
      team: ml
    receiver: 'ml-team'
    continue: true
  - match:
      team: security
    receiver: 'security-team'
    continue: true
  - match:
      team: finance
    receiver: 'finance-team'
    continue: true
  - match_re:
    service: comfyui-engine
  receiver: 'comfyui-engine-team'

inhibit_rules:
- source_match:
    severity: 'critical'
  target_match:
    severity: 'warning'
  equal: ['alertname', 'cluster', 'service']

receivers:
- name: 'default'
  email_configs:
  - to: 'oncall@comfyui-engine.io'
    send_resolved: true
    headers:
      Subject: '[{{ .Status | toUpper }}] ComfyUI Engine Alert'
    html: |
      {{ define "email.default.html" }}
      <html>
      <body>
        <h2>{{ .Status | toUpper }}: {{ .GroupLabels.alertname }}</h2>
        <p><strong>Service:</strong> {{ .GroupLabels.service }}</p>
        <p><strong>Cluster:</strong> {{ .GroupLabels.cluster }}</p>
        <p><strong>Started:</strong> {{ .StartsAt }}</p>
        {{ if .EndsAt }}
        <p><strong>Ended:</strong> {{ .EndsAt }}</p>
        {{ end }}
        <hr/>
        <h3>Alerts:</h3>
        <ul>
        {{ range .Alerts }}
          <li>
            <strong>{{ .Annotations.summary }}</strong><br/>
            {{ .Annotations.description }}<<br/>
            {{ if .Annotations.runbook_url }}
            <a href="{{ .Annotations.runbook_url }}">Runbook</a><br/>
            {{ end }}
            {{ if .Annotations.dashboard_url }}
            <a href="{{ .Annotations.dashboard_url }}">Dashboard</a>
            {{ end }}
          </li>
        {{ end }}
        </ul>
      </body>
      </html>
      {{ end }}

- name: 'pagerduty-critical'
  pagerduty_configs:
  - service_key: '${PAGERDUTY_SERVICE_KEY}'
    description: '{{ .GroupLabels.alertname }}'
    severity: critical
    details:
      summary: '{{ .CommonAnnotations.summary }}'
      description: '{{ .CommonAnnotations.description }}'
      runbook_url: '{{ .CommonAnnotations.runbook_url }}'
      dashboard_url: '{{ .CommonAnnotations.dashboard_url }}'

- name: 'slack-warnings'
  slack_configs:
  - channel: '#comfyui-alerts'
    username: 'ComfyUI Alertmanager'
    icon_emoji: ':warning:'
    title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
    text: |
      {{ range .Alerts }}
      *{{ .Annotations.summary }}*
      {{ .Annotations.description }}
      {{ if .Annotations.runbook_url }}Runbook: {{ .Annotations.runbook_url }}{{ end }}
      {{ end }}
    send_resolved: true

- name: 'comfyui-engine-team'
  slack_configs:
  - channel: '#comfyui-engine-alerts'
    username: 'ComfyUI Engine Bot'
    icon_emoji: ':comfyui:'
    title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
    text: |
      {{ range .Alerts }}
      *{{ .Annotations.summary }}*
      {{ .Annotations.description }}
      {{ if .Annotations.runbook_url }}Runbook: {{ .Annotations.runbook_url }}{{ end }}
      {{ if .Annotations.dashboard_url }}Dashboard: {{ .Annotations.dashboard_url }}{{ end }}
      {{ end }}
    send_resolved: true
  email_configs:
  - to: 'comfyui-engine-team@comfyui-engine.io'
    send_resolved: true

- name: 'ml-team'
  slack_configs:
  - channel: '#ml-alerts'
    username: 'ML Bot'
    icon_emoji: ':robot_face:'
    title: '[ML] {{ .GroupLabels.alertname }}'
    text: |
      {{ range .Alerts }}
      *{{ .Annotations.summary }}*
      {{ .Annotations.description }}
      {{ end }}
    send_resolved: true

- name: 'security-team'
  slack_configs:
  - channel: '#security-alerts'
    username: 'Security Bot'
    icon_emoji: ':shield:'
    title: '[SECURITY] {{ .GroupLabels.alertname }}'
    text: |
      {{ range .Alerts }}
      *{{ .Annotations.summary }}*
      {{ .Annotations.description }}
      {{ end }}
    send_resolved: true
  pagerduty_configs:
  - service_key: '${PAGERDUTY_SECURITY_KEY}'
    severity: critical

- name: 'finance-team'
  email_configs:
  - to: 'finance@comfyui-engine.io'
    send_resolved: true
    headers:
      Subject: '[COST] ComfyUI Engine Alert'