name: CI/CD - ComfyUI Engine v5.1

on:
  push:
    branches: [main, develop]
    paths: ['engine/**','tests/**','main.py','api_server.py','pyproject.toml','Dockerfile','.github/workflows/**']
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}', cache: pip }
      - run: pip install ruff black mypy pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
      - run: ruff check engine/ tests/ main.py api_server.py
      - run: black --check engine/ tests/ main.py api_server.py
      - run: mypy engine/ --ignore-missing-imports

  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ matrix.python-version }}', cache: pip }
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_engine.py -v --tb=short --cov=engine --cov-report=xml
      - uses: codecov/codecov-action@v4
        with: { files: ./coverage.xml, fail_ci_if_error: false }

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}', cache: pip }
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_integration.py tests/test_websocket_stream.py -v --tb=short
        env: { REDIS_URL: redis://localhost:6379/0 }

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}', cache: pip }
      - run: pip install -e . && python benchmark.py --iterations 1000 --output benchmark_results.json
      - uses: actions/upload-artifact@v4
        with: { name: benchmark-results, path: benchmark_results.json, retention-days: 30 }

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with: { context: ., push: false, tags: comfyui-engine:test, cache-from: 'type=gha', cache-to: 'type=gha,mode=max' }
      - run: docker run --rm comfyui-engine:test --help

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}', cache: pip }
      - run: pip install bandit safety
      - run: bandit -r engine/ -f json -o bandit-report.json || true
      - run: safety check --output json > safety-report.json || true
      - uses: actions/upload-artifact@v4
        with: { name: security-reports, path: 'bandit-report.json\nsafety-report.json', retention-days: 30 }

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, docker-build, benchmark]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions: { contents: write, packages: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}', cache: pip }
      - id: version
        run: |
          pip install -e .
          VERSION=$(python -c "import engine; print(engine.__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with: { registry: '${{ env.REGISTRY }}', username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with: { context: ., push: true, tags: '${{ steps.meta.outputs.tags }}', labels: '${{ steps.meta.outputs.labels }}', cache-from: 'type=gha', cache-to: 'type=gha,mode=max' }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ComfyUI Engine ${{ steps.version.outputs.tag }}
          generate_release_notes: true
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
