name: CI/CD Pipeline v5.0

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint and Format Check
  # ─────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install black ruff mypy pre-commit

      - name: Check formatting with black
        run: black --check engine/ tests/ main.py benchmark.py api_server.py dashboard.py

      - name: Lint with ruff
        run: ruff check engine/ tests/ main.py benchmark.py api_server.py dashboard.py

      - name: Type check with mypy
        run: mypy engine/ --ignore-missing-imports

      - name: Pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  # ─────────────────────────────────────────────────────────────
  # Unit Tests
  # ─────────────────────────────────────────────────────────────
  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-asyncio coverage

      - name: Run unit tests
        run: pytest tests/test_engine.py -v --tb=short --cov=engine --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # WebSocket Tests
  # ─────────────────────────────────────────────────────────────
  test-websocket:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-asyncio fastapi uvicorn aiohttp redis

      - name: Run WebSocket tests
        run: pytest tests/test_websocket_stream.py -v --tb=short

  # ─────────────────────────────────────────────────────────────
  # Integration Tests
  # ─────────────────────────────────────────────────────────────
  test-integration:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-asyncio redis

      - name: Run integration tests
        run: pytest tests/test_integration.py -v --tb=short
        env:
          REDIS_URL: redis://localhost:6379/0

  # ─────────────────────────────────────────────────────────────
  # Benchmark
  # ─────────────────────────────────────────────────────────────
  benchmark:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Run benchmark
        run: python benchmark.py --iterations 1000

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json

  # ─────────────────────────────────────────────────────────────
  # Build Docker Image
  # ─────────────────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, test-websocket]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────────────────────────────
  # Security Scan
  # ─────────────────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r engine/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  # ─────────────────────────────────────────────────────────────
  # Load Testing
  # ─────────────────────────────────────────────────────────────
  load-test:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1E69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run smoke test
        run: |
          k6 run --env BASE_URL=http://localhost:8000 --env API_KEY=test-key \
            -i 10 tests/load/k6_load_test.js

      - name: Run load test
        run: |
          k6 run --env BASE_URL=http://localhost:8000 --env API_KEY=test-key \
            tests/load/k6_load_test.js

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: load-test-results.json

  # ─────────────────────────────────────────────────────────────
  # Release
  # ─────────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [docker-build, benchmark, security-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            benchmark_results.json
          generate_release_notes: true
          body: |
            ## ComfyUI Engine v5.0 Release

            ### New Features
            - OpenTelemetry distributed tracing with Jaeger integration
            - WebSocket streaming for real-time job progress updates
            - Advanced Redis caching layer (models, prompts, results, sessions)
            - k6 load testing suite (smoke, load, stress, spike, soak)
            - Chaos engineering tests for resilience validation
            - Kubernetes manifests with HPA, PDB, NetworkPolicy
            - Helm chart for configurable deployments
            - Terraform modules for AWS, GCP, Azure infrastructure
            - Comprehensive v5.0 documentation

            ### Docker Images
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### Quick Start
            ```bash
            make install
            make run
            ```

            ### Full Documentation
            See [README.md](README.md) for complete usage guide.

  # ─────────────────────────────────────────────────────────────
  # Deploy to Staging
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build, test-integration, test-websocket]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging Kubernetes
        run: |
          echo "Deploying to staging..."
          kubectl apply -k k8s/base/
          kubectl rollout status deployment/comfyui-engine -n comfyui-engine

  # ─────────────────────────────────────────────────────────────
  # Deploy to Production
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: [docker-build, release]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production Kubernetes
        run: |
          echo "Deploying to production..."
          kubectl apply -k k8s/base/
          kubectl rollout status deployment/comfyui-engine -n comfyui-engine

      - name: Verify deployment
        run: |
          kubectl get pods -n comfyui-engine
          kubectl get svc -n comfyui-engine
