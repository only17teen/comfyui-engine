# Staging values for comfyui-engine.
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: ghcr.io/only17teen/comfyui-engine
  pullPolicy: IfNotPresent
  tag: "latest"

resources:
  limits:
    cpu: 4000m
    memory: 16Gi
    nvidia.com/gpu: 1
  requests:
    cpu: 2000m
    memory: 8Gi
    nvidia.com/gpu: 1

# GPU configuration
gpu:
  enabled: true
  type: nvidia
  count: 1
  memory: "8192"
  sharing:
    enabled: true
    strategy: time-slicing
    replicas: 2

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  metrics:
    - type: Pods
      pods:
        metric:
          name: nvidia_gpu_utilization
        target:
          type: AverageValue
          averageValue: "70"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60

# Node selector for GPU nodes
nodeSelector:
  accelerator: nvidia-gpu
  environment: staging

# Tolerations for GPU taints
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: environment
    operator: Equal
    value: "staging"
    effect: NoSchedule

# Affinity rules
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - comfyui-engine
          topologyKey: kubernetes.io/hostname

# Persistent Volume Claims
persistence:
  enabled: true
  models:
    enabled: true
    storageClass: "standard"
    accessMode: ReadWriteOnce
    size: 200Gi
  outputs:
    enabled: true
    storageClass: "standard"
    accessMode: ReadWriteOnce
    size: 100Gi
  cache:
    enabled: true
    storageClass: "standard"
    accessMode: ReadWriteOnce
    size: 50Gi

# Configuration
config:
  api:
    host: "0.0.0.0"
    port: 8080
    workers: 4
    timeout: 300
    max_request_size: 104857600  # 100MB
  
  comfyui:
    host: "localhost"
    port: 8188
    path: "/comfyui"
    timeout: 600
  
  redis:
    enabled: true
    url: "redis://comfyui-engine-redis-master:6379/0"
    pool_size: 50
  
  database:
    enabled: true
    type: postgresql
    host: "comfyui-engine-postgresql"
    port: 5432
    name: "comfyui_engine"
    user: "comfyui"
    pool_size: 20
  
  model_cache:
    max_memory_mb: 8192
    max_models: 10
    warmup_on_start: true
    eviction_policy: "lru_memory"
  
  auto_scaler:
    enabled: true
    min_workers: 2
    max_workers: 5
    scale_up_threshold: 0.7
    scale_down_threshold: 0.3
    scale_up_cooldown: 60
    scale_down_cooldown: 300
  
  security:
    jwt_algorithm: "HS256"
    jwt_expiry: 3600
    rate_limit: 100
    rate_limit_window: 60
  
  logging:
    level: DEBUG
    format: json
    output: stdout

# Environment variables
env:
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: CUDA_VISIBLE_DEVICES
    value: "0"
  - name: PYTORCH_CUDA_ALLOC_CONF
    value: "max_split_size_mb:512"
  - name: OMP_NUM_THREADS
    value: "4"

# Secrets
secrets:
  jwt:
    enabled: true
    existingSecret: ""
    secretKey: "jwt-secret"
  db:
    enabled: true
    existingSecret: ""
    secretKey: "password"

# Liveness and readiness probes
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# Pod Disruption Budget
pdb:
  enabled: true
  minAvailable: 1

# Network Policy
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  prometheusRule:
    enabled: true
    rules:
      - alert: ComfyUIEngineHighErrorRate
        expr: rate(comfyui_engine_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate in ComfyUI Engine"
          description: "Error rate is above 10% for more than 5 minutes"
      - alert: ComfyUIEngineHighLatency
        expr: histogram_quantile(0.95, rate(comfyui_engine_request_duration_seconds_bucket[5m])) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency in ComfyUI Engine"
          description: "95th percentile latency is above 60 seconds"

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"
  retention: 7
  storage:
    enabled: true
    provider: s3
    bucket: "comfyui-engine-staging-backups"
    region: "us-east-1"
    path: "backups"

# Update strategy
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Subcharts
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      limits:
        memory: 2Gi
        cpu: 1000m
      requests:
        memory: 1Gi
        cpu: 500m

postgresql:
  enabled: true
  auth:
    username: comfyui
    database: comfyui_engine
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      limits:
        memory: 4Gi
        cpu: 2000m
      requests:
        memory: 2Gi
        cpu: 1000m

prometheus:
  enabled: true
  server:
    persistentVolume:
      enabled: true
      size: 20Gi
    resources:
      limits:
        memory: 8Gi
        cpu: 2000m
      requests:
        memory: 4Gi
        cpu: 1000m

grafana:
  enabled: true
  admin:
    existingSecret: ""
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    size: 10Gi
  resources:
    limits:
      memory: 2Gi
      cpu: 1000m
    requests:
      memory: 1Gi
      cpu: 500m
