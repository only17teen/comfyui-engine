apiVersion: v2
name: comfyui-engine
description: A Helm chart for ComfyUI Engine - Kubernetes deployment
type: application
version: 1.0.0
appVersion: "2.0.0"
keywords:
  - comfyui
  - ai
  - image-generation
  - gpu
home: https://github.com/only17teen/comfyui-engine
sources:
  - https://github.com/only17teen/comfyui-engine
maintainers:
  - name: ComfyUI Engine Team
    email: team@comfyui-engine.dev
dependencies:
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: postgresql
    version: "13.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: prometheus
    version: "25.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "7.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
annotations:
  category: AI/ML
