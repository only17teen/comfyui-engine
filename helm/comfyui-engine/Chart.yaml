apiVersion: v2
name: comfyui-engine
description: Production-grade async generation engine for ComfyUI with resilience patterns and metrics
type: application
version: 4.0.0
appVersion: "4.0.0"
home: https://github.com/user/comfyui-engine
sources:
  - https://github.com/user/comfyui-engine
maintainers:
  - name: Senior MLOps Engineer
    email: dev@localhost
keywords:
  - comfyui
  - stable-diffusion
  - asyncio
  - mlops
  - lora
  - circuit-breaker
  - kubernetes
  - helm
dependencies:
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: prometheus
    version: "25.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "7.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
annotations:
  category: AI/ML
  licenses: MIT
