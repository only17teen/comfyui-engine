apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "comfyui-engine.fullname" . }}
  labels:
    {{- include "comfyui-engine.labels" . | nindent 4 }}
    {{- include "comfyui-engine.extraLabels" . | nindent 4 }}
  {{- if .Values.extraAnnotations }}
  annotations:
    {{- include "comfyui-engine.extraAnnotations" . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: {{ .Values.updateStrategy.type }}
    {{- if eq .Values.updateStrategy.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.updateStrategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.updateStrategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "comfyui-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "comfyui-engine.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "comfyui-engine.priorityClassName" . | nindent 6 }}
      {{- include "comfyui-engine.terminationGracePeriodSeconds" . | nindent 6 }}
      {{- include "comfyui-engine.dnsPolicy" . | nindent 6 }}
      {{- include "comfyui-engine.dnsConfig" . | nindent 6 }}
      {{- include "comfyui-engine.hostAliases" . | nindent 6 }}
      {{- include "comfyui-engine.hostNetwork" . | nindent 6 }}
      {{- include "comfyui-engine.hostPID" . | nindent 6 }}
      {{- include "comfyui-engine.hostIPC" . | nindent 6 }}
      
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      serviceAccountName: {{ include "comfyui-engine.serviceAccountName" . }}
      
      {{- include "comfyui-engine.podSecurityContext" . | nindent 6 }}
      
      {{- if .Values.initContainers }}
      initContainers:
        {{- toYaml .Values.initContainers | nindent 8 }}
      {{- end }}
      {{- include "comfyui-engine.extraInitContainers" . | nindent 6 }}
      
      containers:
        - name: {{ .Chart.Name }}
          {{- include "comfyui-engine.containerSecurityContext" . | nindent 10 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "max_split_size_mb:512"
            - name: OMP_NUM_THREADS
              value: "4"
            - name: REDIS_URL
              value: {{ include "comfyui-engine.redisUrl" . | quote }}
            - name: DB_HOST
              value: {{ include "comfyui-engine.dbHost" . | quote }}
            - name: DB_PORT
              value: {{ .Values.config.database.port | quote }}
            - name: DB_NAME
              value: {{ .Values.config.database.name | quote }}
            - name: DB_USER
              value: {{ .Values.config.database.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "comfyui-engine.dbSecretName" . }}
                  key: {{ .Values.secrets.db.secretKey }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "comfyui-engine.jwtSecretName" . }}
                  key: {{ .Values.secrets.jwt.secretKey }}
            {{- include "comfyui-engine.extraEnv" . | nindent 12 }}
          {{- include "comfyui-engine.extraEnvFrom" . | nindent 10 }}
          {{- include "comfyui-engine.extraArgs" . | nindent 10 }}
          
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: models
              mountPath: /models
            - name: outputs
              mountPath: /outputs
            - name: cache
              mountPath: /cache
            {{- include "comfyui-engine.extraVolumeMounts" . | nindent 12 }}
          
          {{- if .Values.sidecars }}
          {{- toYaml .Values.sidecars | nindent 8 }}
          {{- end }}
          {{- include "comfyui-engine.extraContainers" . | nindent 8 }}
      
      volumes:
        - name: config
          configMap:
            name: {{ include "comfyui-engine.fullname" . }}-config
        - name: models
          {{- if .Values.persistence.models.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "comfyui-engine.fullname" . }}-models
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: outputs
          {{- if .Values.persistence.outputs.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "comfyui-engine.fullname" . }}-outputs
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: cache
          {{- if .Values.persistence.cache.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "comfyui-engine.fullname" . }}-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- include "comfyui-engine.extraVolumes" . | nindent 8 }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
