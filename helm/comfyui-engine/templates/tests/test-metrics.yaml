{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "comfyui-engine.fullname" . }}-test-metrics
  labels:
    {{- include "comfyui-engine.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['--no-verbose', '--tries=1', '--spider', '{{ include "comfyui-engine.fullname" . }}-metrics:{{ .Values.metricsService.port }}/metrics']
  restartPolicy: Never
{{- end }}