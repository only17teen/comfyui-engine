apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "comfyui-engine.configMapName" . }}
  labels:
    {{- include "comfyui-engine.labels" . | nindent 4 }}
data:
  comfyui.url: {{ .Values.config.comfyui.url | quote }}
  engine.max_concurrent: {{ .Values.config.comfyui.max_concurrent | quote }}
  engine.log_level: {{ .Values.config.engine.log_level | quote }}
  engine.json_logging: {{ .Values.config.engine.json_logging | quote }}
  engine.metrics_port: {{ .Values.config.engine.metrics_port | quote }}
  engine.queue_max_size: {{ .Values.config.engine.queue_max_size | quote }}
  engine.timeout: {{ .Values.config.engine.timeout | quote }}
  otel.endpoint: {{ .Values.config.otel.endpoint | quote }}
  otel.enabled: {{ .Values.config.otel.enabled | quote }}
  prompts.yaml: |
    prompts:
      trigger_words:
        {{- range .Values.config.prompts.trigger_words }}
        - {{ . | quote }}
        {{- end }}
      negative_prompt: |
        {{ .Values.config.prompts.negative_prompt | nindent 8 }}
    lora:
      sampling:
        steps_range: [20, 40]
        cfg_scale_range: [5.0, 9.0]
        sampler_names:
          - "DPM++ 2M Karras"
          - "Euler a"
        scheduler: "Karras"
      resolutions:
        - [512, 768]
        - [768, 512]
        - [640, 640]
      batch_size: 4
      max_concurrent: 3
