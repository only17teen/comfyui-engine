apiVersion: v1
kind: Service
metadata:
  name: {{ include "comfyui-engine.fullname" . }}
  labels:
    {{- include "comfyui-engine.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "comfyui-engine.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "comfyui-engine.fullname" . }}-metrics
  labels:
    {{- include "comfyui-engine.labels" . | nindent 4 }}
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "comfyui-engine.selectorLabels" . | nindent 4 }}
