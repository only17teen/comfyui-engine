apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: comfyui-engine-output
  labels:
    app: comfyui-engine
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: comfyui-engine-models
  labels:
    app: comfyui-engine
spec:
  accessModes:
  - ReadOnlyMany
  resources:
    requests:
      storage: 500Gi
  storageClassName: fast-ssd
