apiVersion: v1
kind: Service
metadata:
  name: comfyui-engine
  labels:
    app: comfyui-engine
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: comfyui-engine
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: comfyui-engine-metrics
  labels:
    app: comfyui-engine
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: comfyui-engine
