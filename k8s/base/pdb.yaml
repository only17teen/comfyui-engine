apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: comfyui-engine
  labels:
    app: comfyui-engine
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: comfyui-engine
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: comfyui-engine-redis
  labels:
    app: redis
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: redis
