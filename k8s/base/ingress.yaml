apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: comfyui-engine
  labels:
    app: comfyui-engine
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.comfyui-engine.example.com
    secretName: comfyui-engine-tls
  rules:
  - host: api.comfyui-engine.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: comfyui-engine
            port:
              number: 80
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: comfyui-engine-metrics
            port:
              number: 9090
