apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: comfyui-engine-staging

namePrefix: staging-

resources:
- ../base

replicas:
- name: comfyui-engine
  count: 2

configMapGenerator:
- name: comfyui-engine-config
  behavior: merge
  literals:
  - engine.log_level=DEBUG
  - engine.max_concurrent=2
  - otel.endpoint=http://otel-collector.monitoring:4317

images:
- name: ghcr.io/user/comfyui-engine
  newTag: v4.0.0-staging

commonLabels:
  environment: staging
  tier: backend
